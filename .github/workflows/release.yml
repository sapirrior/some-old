name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            cc: gcc
          - os: ubuntu-latest
            target: linux-aarch64
            cc: aarch64-linux-gnu-gcc
            apt_pkg: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: macos-x86_64
            cc: "clang -arch x86_64"
          - os: macos-latest
            target: macos-arm64
            cc: "clang -arch arm64"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Cross-Compiler (Linux ARM64)
        if: matrix.apt_pkg
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_pkg }}

      - name: Build Inkless
        run: make CC="${{ matrix.cc }}"

      - name: Package Artifacts
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="inkless-${VERSION}-${{ matrix.target }}.tar.gz"
          
          mkdir dist
          cp build/inkl dist/
          cp README.md LICENSE dist/
          
          tar -czvf "$ARCHIVE_NAME" -C dist .
          
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
